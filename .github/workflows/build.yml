name: Build & Release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npm run build

      - name: Commit dist if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/MatchStatsAPI.js
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "build: update bundled plugin [skip ci]" && git push

      - name: Update latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --yes 2>/dev/null || true
          git tag -f latest
          git push -f origin latest
          gh release create latest dist/MatchStatsAPI.js \
            --title "Latest Build" \
            --notes "Auto-built from $(git rev-parse --short HEAD). Drop \`MatchStatsAPI.js\` into your IW4MAdmin \`Plugins/\` folder."
